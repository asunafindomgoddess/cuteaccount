<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar Nombre y Foto en X</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #000; color: #fff; }
    button { padding: 20px 40px; font-size: 24px; background: #1DA1F2; color: white; border: none; border-radius: 50px; cursor: pointer; }
    button:hover { background: #0c84d1; }
    .warning { color: #ff4444; margin-top: 30px; font-size: 18px; }
  </style>
</head>
<body>
  <h1>Herramienta para cambiar tu perfil en X</h1>
  <p>Autoriza y cambia tu nombre (y foto si está configurado).</p>
  
  <a href="/auth"><button>Iniciar → Autorizar con X</button></a>
  
  <p class="warning">WARNING! Your profile will look much better~</p>
</body>
</html>
